<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — GlobalOSP</title>
  <meta name="description" content="GlobalOSP is a social platform for sharing projects from any platform.">
  <link rel="icon" href="assets/logo-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="">
<main class="auth-page">
  <section class="auth-card">
    <a class="auth-logo" href="index.html"><img src="assets/logo-icon.svg" alt="">GlobalOSP</a>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account.</p>

    <button class="btn provider-btn btn-google" type="button"><span class="provider-icon"><svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.7 3.8-5.5 3.8-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.3 14.6 2.4 12 2.4 6.7 2.4 2.4 6.7 2.4 12s4.3 9.6 9.6 9.6c5.5 0 9.2-3.9 9.2-9.4 0-.6-.1-1.1-.2-1.6H12z"/></svg></span><span>Continue with Google</span></button>
    <button class="btn provider-btn btn-github" type="button"><span class="provider-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.2-1.6-1.2-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1.6 2.1 4.4 1.5.1-.7.4-1.2.7-1.5-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C18.2 6.1 19.2 6.4 19.2 6.4c.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .5z"/></svg></span><span>Continue with GitHub</span></button>
    <button class="btn provider-btn roblox btn-roblox" type="button"><span class="provider-icon roblox-icon"></span><span>Continue with Roblox</span></button>

    <div class="divider"><span>or</span></div>

    <form id="loginForm">
      <label>Email</label>
      <input class="form-input" id="email" type="email" required>
      <br><br>
      <label>Password</label>
      <input class="form-input" id="password" type="password" required>
      <br><br>
      <button class="btn btn-primary btn-full">Log in</button>
    </form>

    <p class="auth-footer">No account? <a href="signup.html">Create account</a></p>
  </section>
  <aside class="auth-art"><img src="assets/logo-icon.svg" alt=""></aside>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
