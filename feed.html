<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed — GlobalOSP</title>
  <meta name="description" content="GlobalOSP is a social platform for sharing projects from any platform.">
  <link rel="icon" href="assets/logo-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="">
<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><img src="assets/logo-icon.svg" alt="GlobalOSP">GlobalOSP</a>
    <div class="nav-links"><a class="nav-link " href="index.html">Explore</a><a class="nav-link active" href="feed.html">Feed</a><a class="nav-link " href="profile.html">Profile</a><a class="nav-link " href="settings.html">Settings</a><a class="nav-link " href="patchwork.html">Patchwork</a></div>
    <div class="nav-search">
      <input id="globalSearch" placeholder="Search GlobalOSP...">
      <div id="searchResults" class="search-results"></div>
    </div>
    <div id="navActions" class="nav-actions">
      <a class="btn btn-ghost" href="login.html">Log in</a>
      <a class="btn btn-primary" href="signup.html">Sign up</a>
    </div>
    <button id="hamb" class="hamburger">☰</button>
  </div>
  <div id="mobile" class="mobile-menu">
    <a href="index.html">Explore</a><a href="feed.html">Feed</a><a href="profile.html">Profile</a><a href="settings.html">Settings</a><a href="patchwork.html">Patchwork</a>
    <a href="login.html">Log in</a>
    <a href="signup.html">Sign up</a>
  </div>
</nav>
<main class="feed-layout">
  <aside class="side">
    <a class="active" href="feed.html"><span>Home</span></a>
    <a href="profile.html"><span>Profile</span></a>
    <a href="settings.html"><span>Settings</span></a>
    <a href="patchwork.html"><span>Patchwork</span></a>
  </aside>

  <section class="feed-main">
    <div class="feed-head">Home</div>

    <section class="compose">
      <div class="avatar">YOU</div>
      <div style="flex:1">
        <textarea id="postInput" class="main" maxlength="500" placeholder="Share a project, update, idea, or devlog..."></textarea>

        <div class="fields">
          <select id="platform">
            <option>GitHub</option><option>Replit</option><option>Roblox Studio</option><option>Scratch</option><option>GitLab</option><option>Website</option><option>Other</option>
          </select>
          <input id="title" placeholder="Project title">
          <input id="url" placeholder="Project URL">
          <input id="image" placeholder="Direct image URL">
          <input id="tags" placeholder="Tags: js, roblox, web">
          <p class="smallnote">Use image URLs ending in .png, .jpg, .gif, .webp, or .avif.</p>
          <textarea id="desc" placeholder="Longer description..."></textarea>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="muted" id="count">0/500</span>
          <button class="btn btn-primary" id="postBtn">Share</button>
        </div>
      </div>
    </section>

    <div id="feed" class="post-list"></div>
  </section>

  <aside class="side right">
    <h3>Trending</h3>
    <p class="muted">#RobloxOpen</p>
    <p class="muted">#TSProjects</p>
  </aside>
</main>

<div id="modal" class="modal">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;"><h3>Comments</h3><button class="close">×</button></div>
    <div id="commentPreview" class="preview"></div>
    <div id="comments"></div>
    <textarea id="commentInput" placeholder="Write a comment..."></textarea>
    <br><br>
    <button id="sendComment" class="btn btn-primary btn-full">Comment</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
