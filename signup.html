<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — GlobalOSP</title>
  <meta name="description" content="GlobalOSP is a social platform for sharing projects from GitHub, Replit, Roblox Studio, Scratch, GitLab, and any URL." />
  <link rel="icon" href="assets/logo-icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-logo" href="index.html">
        <img src="assets/logo-icon.svg" alt="GlobalOSP" />
        <span>GlobalOSP</span>
      </a>

      <h1 class="auth-title">Join GlobalOSP</h1>
      <p class="auth-subtitle">Share your projects with the world — from any platform.</p>

      <button class="btn btn-github" type="button">Sign up with GitHub</button>

      <div class="auth-divider"><span>or</span></div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input class="form-input" id="name" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" id="username" autocomplete="username" placeholder="letters, numbers, underscores" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" id="email" type="email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" type="password" autocomplete="new-password" required />
        </div>

        <button class="btn btn-primary btn-full" type="submit">Create account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
